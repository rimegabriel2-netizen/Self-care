<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Planificateur Privé</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; padding: 1rem; }
    .app { max-width: 500px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; color: #6366f1; }
    section { background: #1e293b; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; border: 1px solid #334155; }
    h3 { font-size: 0.9rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 0.75rem; }
    input { width: 100%; padding: 0.8rem; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; margin-bottom: 0.5rem; }
    button { width: 100%; padding: 0.8rem; background: #6366f1; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
    .days { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 1rem; padding-bottom: 5px; }
    .day { padding: 8px 15px; background: #334155; border-radius: 20px; cursor: pointer; white-space: nowrap; }
    .day.active { background: #6366f1; }
    .task { display: flex; align-items: center; justify-content: space-between; background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #334155; }
    .task.done span { text-decoration: line-through; color: #64748b; }
    .delete-btn { color: #ef4444; cursor: pointer; font-weight: bold; padding: 5px; }
  </style>
</head>
<body>

<div class="app">
  <h1>🌸 Mon Self-Care</h1>

  <section>
    <h3>Objectifs de la semaine</h3>
    <input type="text" id="obj1" placeholder="Objectif 1" oninput="saveData()">
    <input type="text" id="obj2" placeholder="Objectif 2" oninput="saveData()">
  </section>

  <div class="days" id="daySelector"></div>

  <section>
    <h3 id="currentDayTitle">Lundi</h3>
    <div id="taskList"></div>
    <div style="margin-top: 1rem;">
      <input type="text" id="taskInput" placeholder="Nouvelle habitude...">
      <button onclick="addTask()">Ajouter</button>
    </div>
  </section>
</div>

<script>
  // Initialisation des données
  let state = JSON.parse(localStorage.getItem('myPlannerData')) || {
    objectives: ["", ""],
    days: { "Lun": [], "Mar": [], "Mer": [], "Jeu": [], "Ven": [], "Sam": [], "Dim": [] }
  };
  
  let currentDay = "Lun";
  const days = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];

  function init() {
    const selector = document.getElementById('daySelector');
    selector.innerHTML = days.map(d => `<div class="day ${d===currentDay?'active':''}" onclick="changeDay('${d}')">${d}</div>`).join('');
    document.getElementById('obj1').value = state.objectives[0];
    document.getElementById('obj2').value = state.objectives[1];
    renderTasks();
  }

  function changeDay(d) {
    currentDay = d;
    document.getElementById('currentDayTitle').innerText = d;
    document.querySelectorAll('.day').forEach(el => el.classList.toggle('active', el.innerText === d));
    renderTasks();
  }

  function renderTasks() {
    const list = document.getElementById('taskList');
    list.innerHTML = state.days[currentDay].map((t, i) => `
      <div class="task ${t.done ? 'done' : ''}">
        <span onclick="toggleTask(${i})" style="cursor:pointer; flex:1">${t.text}</span>
        <span class="delete-btn" onclick="deleteTask(${i})">✕</span>
      </div>
    `).join('');
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    if (!input.value) return;
    state.days[currentDay].push({ text: input.value, done: false });
    input.value = "";
    saveData();
    renderTasks();
  }

  function toggleTask(i) {
    state.days[currentDay][i].done = !state.days[currentDay][i].done;
    saveData();
    renderTasks();
  }

  function deleteTask(i) {
    state.days[currentDay].splice(i, 1);
    saveData();
    renderTasks();
  }

  function saveData() {
    state.objectives = [document.getElementById('obj1').value, document.getElementById('obj2').value];
    localStorage.setItem('myPlannerData', JSON.stringify(state));
  }

  init();
</script>

</body>
</html>
