<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self Care</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: #0f172a; color: #e2e8f0;
      padding: 1rem; max-width: 640px; margin: 0 auto; min-height: 100vh;
    }
    h1 { margin-bottom: 1rem; font-size: 1.5rem; }
    section { background: #1e293b; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
    input, button {
      width: 100%; padding: 0.75rem; margin-bottom: 0.5rem;
      border: 1px solid #334155; border-radius: 8px;
      background: #0f172a; color: #e2e8f0; font-size: 1rem;
    }
    button { background: #6366f1; border: none; color: white; font-weight: 600; cursor: pointer; }
    .entry { padding: 0.75rem; border-bottom: 1px solid #334155; }
    .entry-meta { font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.25rem; }
    .hidden { display: none; }
    .status { font-size: 0.85rem; color: #94a3b8; margin-top: 0.5rem; }
  </style>
</head>
<body>

  <h1>Self Care</h1>

  <section id="authSection">
    <p style="margin-bottom: 0.75rem;">Connexion :</p>
    <input type="email" id="emailInput" placeholder="toi@email.com" />
    <button id="loginBtn">Recevoir le lien</button>
    <p class="status" id="authStatus"></p>
  </section>

  <section id="appSection" class="hidden">
    <input type="text" id="nomInput" placeholder="Note ou habitude..." />
    <button id="saveBtn">Enregistrer</button>
    <button class="status" id="logoutBtn" style="background:none; border:none; text-decoration:underline;">Déconnexion</button>
  </section>

  <section id="listSection" class="hidden">
    <h2 style="font-size: 1rem; margin-bottom: 0.75rem;">Historique</h2>
    <div id="entriesList"></div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://ecogcekzeohmreggbwro.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjb2djZWt6ZW9obXJlZ2did3JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMjYyODksImV4cCI6MjA5MjYwMjI4OX0.Zx48dEQK2INXYnPn96-ySb3zd-d8y_T-xN8z41HHvsU';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const authSection = document.getElementById('authSection');
    const appSection = document.getElementById('appSection');
    const listSection = document.getElementById('listSection');
    const entriesList = document.getElementById('entriesList');

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('emailInput').value.trim();
      document.getElementById('authStatus').textContent = 'Envoi...';
      const { error } = await db.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.href } });
      document.getElementById('authStatus').textContent = error ? 'Erreur : ' + error.message : 'Lien envoyé !';
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await db.auth.signOut();
      location.reload();
    });

    async function enregistrer() {
      const nom = document.getElementById('nomInput').value.trim();
      if (!nom) return;
      const { error } = await db.from('entries').insert([{ nom }]);
      if (error) alert('Erreur : ' + error.message);
      else { document.getElementById('nomInput').value = ''; charger(); }
    }

    async function charger() {
      const { data, error } = await db.from('entries').select('*').order('created_at', { ascending: false });
      if (error) return console.error(error);
      entriesList.innerHTML = data.map(e => `
        <div class="entry">
          <div class="entry-meta">${new Date(e.created_at).toLocaleString()}</div>
          <div>${e.nom}</div>
        </div>
      `).join('');
    }

    document.getElementById('saveBtn').addEventListener('click', enregistrer);

    async function init() {
      const { data: { session } } = await db.auth.getSession();
      if (session) {
        authSection.classList.add('hidden');
        appSection.classList.remove('hidden');
        listSection.classList.remove('hidden');
        charger();
      }
    }
    init();
  </script>
</body>
</html>
