<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self Care</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 1rem;
      max-width: 640px;
      margin: 0 auto;
      min-height: 100vh;
    }
    h1 { margin-bottom: 1rem; font-size: 1.5rem; }
    section { background: #1e293b; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
    input, textarea, select, button {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
      font-family: inherit;
    }
    button {
      background: #6366f1;
      border: none;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #4f46e5; }
    button.ghost { background: transparent; border: 1px solid #334155; }
    .entry { padding: 0.75rem; border-bottom: 1px solid #334155; }
    .entry:last-child { border-bottom: none; }
    .entry-meta { font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.25rem; }
    .hidden { display: none; }
    .row { display: flex; gap: 0.5rem; }
    .row > * { flex: 1; }
    .status { font-size: 0.85rem; color: #94a3b8; margin-top: 0.5rem; }
  </style>
</head>
<body>

  <h1>Self Care</h1>

  <!-- Écran de connexion (magic link) -->
  <section id="authSection">
    <p style="margin-bottom: 0.75rem;">Entre ton email pour te connecter :</p>
    <input type="email" id="emailInput" placeholder="toi@email.com" />
    <button id="loginBtn">Recevoir le lien</button>
    <p class="status" id="authStatus"></p>
  </section>

  <!-- Écran app (affiché après login) -->
  <section id="appSection" class="hidden">
    <div class="row">
      <span class="status" id="userEmail"></span>
      <button class="ghost" id="logoutBtn" style="width:auto;">Déconnexion</button>
    </div>
  </section>

  <section id="formSection" class="hidden">
    <textarea id="contenuInput" rows="3" placeholder="Qu'est-ce qui se passe ?"></textarea>
    <div class="row">
      <select id="humeurInput">
        <option value="">Humeur /10</option>
        <option value="1">1 — très bas</option>
        <option value="3">3</option>
        <option value="5">5 — neutre</option>
        <option value="7">7</option>
        <option value="10">10 — excellent</option>
      </select>
      <input type="text" id="tagInput" placeholder="Tag (ex: stress)" />
    </div>
    <button id="saveBtn">Enregistrer</button>
  </section>

  <section id="listSection" class="hidden">
    <h2 style="font-size: 1rem; margin-bottom: 0.75rem;">Historique</h2>
    <div id="entriesList"></div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ====== CONFIG — remplace par tes clés Supabase ======
    const SUPABASE_URL = 'https://ecogcekzeohmreggbwro.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjb2djZWt6ZW9obXJlZ2did3JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMjYyODksImV4cCI6MjA5MjYwMjI4OX0.Zx48dEQK2INXYnPn96-ySb3zd-d8y_T-xN8z41HHvsU';
    // =====================================================

    // Fix du bug original : le client doit avoir un nom différent
    // de l'objet global `supabase` du CDN.
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ---------- DOM ----------
    const authSection = document.getElementById('authSection');
    const appSection = document.getElementById('appSection');
    const formSection = document.getElementById('formSection');
    const listSection = document.getElementById('listSection');
    const authStatus = document.getElementById('authStatus');
    const userEmail = document.getElementById('userEmail');
    const entriesList = document.getElementById('entriesList');

    // ---------- AUTH ----------
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('emailInput').value.trim();
      if (!email) return;
      authStatus.textContent = 'Envoi...';
      const { error } = await db.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.href }
      });
      authStatus.textContent = error
        ? 'Erreur : ' + error.message
        : 'Lien envoyé. Vérifie ta boîte mail.';
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await db.auth.signOut();
      location.reload();
    });

    // ---------- CRUD ----------
    async function enregistrerEntree() {
      const contenu = document.getElementById('contenuInput').value.trim();
      const humeur = document.getElementById('humeurInput').value || null;
      const tag = document.getElementById('tagInput').value.trim() || null;
      if (!contenu) return;

      const { data: { user } } = await db.auth.getUser();
      const { error } = await db
        .from('entries')
        .insert([{ contenu, humeur, tag, user_id: user.id }]);

      if (error) return alert('Erreur : ' + error.message);

      document.getElementById('contenuInput').value = '';
      document.getElementById('humeurInput').value = '';
      document.getElementById('tagInput').value = '';
      chargerEntrees();
    }

    async function chargerEntrees() {
      const { data, error } = await db
        .from('entries')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(50);

      if (error) return console.error(error);
      afficherEntrees(data);
    }

    function afficherEntrees(entries) {
      if (!entries.length) {
        entriesList.innerHTML = '<p class="status">Rien pour l\'instant.</p>';
        return;
      }
      entriesList.innerHTML = entries.map(e => `
        <div class="entry">
          <div class="entry-meta">
            ${new Date(e.created_at).toLocaleString('fr-CH')}
            ${e.humeur ? ' · humeur ' + e.humeur + '/10' : ''}
            ${e.tag ? ' · #' + e.tag : ''}
          </div>
          <div>${escapeHtml(e.contenu)}</div>
        </div>
      `).join('');
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => (
        { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
      ));
    }

    document.getElementById('saveBtn').addEventListener('click', enregistrerEntree);

    // ---------- INIT ----------
    async function init() {
      const { data: { session } } = await db.auth.getSession();
      if (session) {
        authSection.classList.add('hidden');
        appSection.classList.remove('hidden');
        formSection.classList.remove('hidden');
        listSection.classList.remove('hidden');
        userEmail.textContent = session.user.email;
        chargerEntrees();
      }
    }

    db.auth.onAuthStateChange((_event, session) => {
      if (session) init();
    });

    init();
  </script>
</body>
</html>
